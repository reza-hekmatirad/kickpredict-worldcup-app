<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KickPredict>
</head>
<body>

    //........................header........................
    <header>

        <div class="logo">
            <img src="/documentation/logo.png" alt="logo of the website">
        </div>
        
        <nav>
            <ul>
                <li><a href="index.html"> Home </a></li>
                <li><a href="teams.html"> Teams </a></li>
                <li><a href="matches.html"> Matches </a></li>
                <li><a href="predictions.html"> predictions </a></li>
            </ul>
        </nav>
    
    </header>

    //........................main........................
    <main>

    //........................hero........................
    <section class="hero">

        <div class="hero-text">
            <h1>World Cup Match Predictor</h1>

            <p>
                Predict the scores, track matches and challenge yourself.
            </p>

            <button>View Matches</button>
        </div>

        <div class="hero-image">
            <img src="/documentation/hero.png" alt="earth in the shape of a ball and some countries flags">
        </div>

    </section>

    //........................statistic cards........................
    <section class="statistics">

        <div class="stat-card">
            <h3>Teams</h3>
            <p>48</p>
        </div>

        <div class="stat-card">
            <h3>Matches</h3>
            <p>96</p>
        </div>

        <div class="stat-card">
            <h3>Predictions</h3>
            <p>112</p>
        </div>

    </section>

    //........................upcoming-matches........................
    <section class="upcoming-matches">

        <div class="upcoming-matches-title">
            <h2>Upcoming Matches</h2>
        </div>

        <button>View All Matches</button>

        <div class="match-cards">

            <div class="match1-card">

                <div class="host-team">
                    <h3>Netherlands</h3>
                </div>
                <div class="date-time">
                    <p>DD-MM-YYYY</p>
                    <p>HH:MM</p>
                </div>
                <div class="guest-team">
                    <h3>Brazil</h3>
                </div>
                <div class="view-match-btn">
                    <button>View Match</button>
                </div>
                
            </div>

            <div class="match2-card">
                
                <div class="host-team">
                    <h3>France</h3>
                </div>
                <div class="date-time">
                    <p>DD-MM-YYYY</p>
                    <p>HH:MM</p>
                </div>
                <div class="guest-team">
                    <h3>Spain</h3>
                </div>
                <div class="view-match-btn">
                    <button>View Match</button>
                </div>

            </div>

            <div class="match3-card">

                <div class="host-team">
                    <h3>Argentina</h3>
                </div>
                <div class="date-time">
                    <p>DD-MM-YYYY</p>
                    <p>HH:MM</p>
                </div>
                <div class="guest-team">
                    <h3>Portugal</h3>
                </div>
                <div class="view-match-btn">
                    <button>View Match</button>
                </div>

            </div>

        </div>

    </section>

    ////........................footer........................
    <footer>

        <div class="footer-content">

            <div>
                <img src="/documentation/logo.png" alt="logo">
                <p>
                    Ultimate platform for World Cup match prediction. <br/>
                    Predict, Compete and Enjoy!
                </p>
            </div>

        </div>

        <div class="copyright">
            <p>© 2026 KickPredict. All rights reserved.</p>
        </div>

    </footer>

    </main>
    
</body>
</html>
